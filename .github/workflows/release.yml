name: Build and Release

on:
  push:
    tags:
      - "v*"

env:
  TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
  TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

jobs:
  build-linux:
    name: Linux (.deb, .AppImage, .rpm)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - uses: dtolnay/rust-toolchain@stable

      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev build-essential curl wget file \
            libssl-dev libgtk-3-dev libayatana-appindicator3-dev \
            librsvg2-dev libfuse2 patchelf

      - run: npm install

      - name: Build
        run: npx tauri build

      - name: Upload deb
        uses: actions/upload-artifact@v4
        with:
          name: deb
          path: src-tauri/target/release/bundle/deb/*.deb

      - name: Upload AppImage
        uses: actions/upload-artifact@v4
        with:
          name: appimage
          path: src-tauri/target/release/bundle/appimage/*.AppImage

      - name: Upload rpm
        uses: actions/upload-artifact@v4
        with:
          name: rpm
          path: src-tauri/target/release/bundle/rpm/*.rpm

      - name: Upload sig files
        uses: actions/upload-artifact@v4
        with:
          name: sig-linux
          path: src-tauri/target/release/bundle/**/*.sig
          if-no-files-found: ignore

  build-windows:
    name: Windows (.msi)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - uses: dtolnay/rust-toolchain@stable

      - run: npm install

      - name: Build
        run: npx tauri build

      - name: Upload msi
        uses: actions/upload-artifact@v4
        with:
          name: msi
          path: src-tauri/target/release/bundle/msi/*.msi

      - name: Upload sig files
        uses: actions/upload-artifact@v4
        with:
          name: sig-windows
          path: src-tauri/target/release/bundle/**/*.sig
          if-no-files-found: ignore

  release:
    name: Attach to Release
    needs: [build-linux, build-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/download-artifact@v4

      - name: Generate update manifest
        run: |
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"
          DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")

          LINUX_SIG="$(cat sig-linux/*.deb.sig 2>/dev/null || cat sig-linux/*.AppImage.sig 2>/dev/null || echo '')"
          WIN_SIG="$(cat sig-windows/*.msi.sig 2>/dev/null || echo '')"

          cat > latest.json << EOF
          {
            "version": "${VERSION}",
            "notes": "See the release notes for details.",
            "pub_date": "${DATE}",
            "platforms": {
              "linux-x86_64": {
                "signature": "${LINUX_SIG}",
                "url": "https://github.com/khurrambhutto/noted/releases/download/${TAG}/noted_${VERSION}_amd64.deb"
              },
              "windows-x86_64": {
                "signature": "${WIN_SIG}",
                "url": "https://github.com/khurrambhutto/noted/releases/download/${TAG}/noted_${VERSION}_x64_en-US.msi"
              }
            }
          }
          EOF

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            deb/*.deb
            appimage/*.AppImage
            rpm/*.rpm
            msi/*.msi
            latest.json
          generate_release_notes: true

      - name: Commit latest.json back to repo
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          # stash the generated manifest before switching branches
          cp latest.json /tmp/latest.json
          git fetch origin main
          git checkout main
          cp /tmp/latest.json latest.json
          git add latest.json
          git commit -m "Update latest.json for ${GITHUB_REF_NAME}" || echo "No changes to commit"
          git push
